<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hestia Knowledge Core</title>
<script type="module">
  // 预加载 Three.js（ESM）到全局，供主脚本（普通 script）使用
  import('./vendor/three.module.min.js')
    .then(THREE => { window.THREE = THREE; window.dispatchEvent(new Event('three-ready')); })
    .catch(e => { window.__threeLoadError = String(e); console.error('Three.js 加载失败', e); });
</script>
<style>
:root{
  /* 品牌三色（与 HestiaOS 统一）*/
  --green:    #2c9678;   /* 主操作：搜索/编译按钮、覆盖度进度条、active Claim */
  --klein:    #002FA7;   /* 数据强调：选中节点、链接、Evidence 引用、置信度数值 */
  --canvas:   #DADFE2;   /* 画布背景、卡片底色 */

  /* 三栏背景 */
  --bar-left:   #002FA7;  /* 左功能栏：克莱因蓝 */
  --bar-mid:    #DADFE2;  /* 中知识图谱：浅灰 */
  --bar-right:  #373834;  /* 右词条详情：深炭 */

  /* 深色背景(左栏蓝 / 右栏炭)上的前景色 */
  --on-dark:     #f3f5f9;   /* 深色栏主文字 */
  --on-dark-2:   rgba(243,245,249,.66);  /* 深色栏次文字 */
  --on-dark-3:   rgba(243,245,249,.40);  /* 深色栏弱文字 */
  --on-dark-line:rgba(255,255,255,.14);  /* 深色栏分隔线 */
  --klein-bright:#7d97ff;   /* 蓝在深炭底上提亮版：置信度数值/Evidence 等"要被注意的数据" */
  --green-bright:#46c79f;   /* 绿在深色底上提亮版 */

  /* 派生（仅明度/透明度变体，不引入新色相） */
  --green-d:  #1f6e58;
  --green-l:  #6bbfa6;
  --green-12: rgba(44,150,120,.12);
  --green-20: rgba(44,150,120,.20);
  --klein-d:  #001f70;
  --klein-l:  #5a78cc;
  --klein-12: rgba(0,47,167,.12);
  --klein-20: rgba(0,47,167,.20);

  /* 中性 */
  --ink:      #1a1d24;   /* 主文字（非纯黑） */
  --ink-2:    #555b66;   /* 次文字 */
  --ink-3:    #8b909b;   /* 弱文字 */
  --line:     #c4ccd2;   /* 边框（配合更深的画布灰）*/
  --line-2:   #d0d6db;
  --white:    #ffffff;

  /* 冲突警示（功能性破例，低饱和暗红） */
  --alert:    #b0413e;
  --alert-12: rgba(176,65,62,.12);
  --alert-bright:#e8736f;  /* 深色底上的警示 */

  --r:   10px;
  --r-s: 7px;
  --shadow: 0 1px 2px rgba(26,29,36,.04), 0 4px 16px rgba(26,29,36,.06);
  --shadow-lg: 0 8px 32px rgba(26,29,36,.12);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--canvas);
  color:var(--ink);
  font-size:14px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  height:100vh;
  overflow:hidden;
}

/* ── 顶栏 ── */
.topbar{
  height:60px;flex-shrink:0;
  background:var(--white);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:0 16px;
  position:relative;
  z-index:20;
}
.brand{
  display:flex;align-items:center;gap:8px;
  font-weight:700;font-size:15px;letter-spacing:-.01em;
  white-space:nowrap;min-width:0;overflow:hidden;
}
.brand .mark{
  width:26px;height:26px;border-radius:7px;
  background:linear-gradient(135deg,var(--green),var(--klein));
  display:grid;place-items:center;
  color:#fff;font-size:14px;font-weight:800;
}
.brand .sub{color:var(--ink-3);font-weight:500;font-size:12px;
  border-left:1px solid var(--line);padding-left:10px;}
.brand .ver{color:var(--ink-3);font-weight:600;font-size:11px;opacity:.65;letter-spacing:.02em}

/* 搜索 */
.search-wrap{flex:1;display:flex;gap:10px;align-items:center;max-width:680px}
.search-box{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--canvas);
  border:1.5px solid var(--line);
  border-radius:var(--r);
  padding:0 12px;height:38px;
  transition:border-color .15s,box-shadow .15s;
}
.search-box:focus-within{
  border-color:var(--green);
  box-shadow:0 0 0 3px var(--green-12);
}
.search-box svg{flex-shrink:0;color:var(--ink-3)}
.search-box input{
  flex:1;border:none;background:none;outline:none;
  font-size:14px;color:var(--ink);font-family:inherit;
}
.search-box input::placeholder{color:var(--ink-3)}

.modes{display:flex;background:var(--canvas);border-radius:var(--r);padding:3px;gap:2px}
.mode-btn{
  border:none;background:none;cursor:pointer;
  font-family:inherit;font-size:12px;font-weight:600;color:var(--ink-2);
  padding:6px 11px;border-radius:var(--r-s);
  transition:all .15s;white-space:nowrap;
}
.mode-btn:hover{color:var(--ink)}
.mode-btn.on{background:var(--white);color:var(--green);box-shadow:var(--shadow)}

.topbar-actions{display:flex;gap:9px;margin-left:auto;align-items:center}
.btn{
  border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:13px;
  padding:9px 15px;border-radius:var(--r-s);transition:all .15s;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-d)}
.btn-ghost{background:var(--canvas);color:var(--ink-2)}
.btn-ghost:hover{background:var(--line-2);color:var(--ink)}

.conn-pill{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--ink-2);
  padding:6px 11px;border-radius:20px;background:var(--canvas);
}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3)}
.conn-pill.live .conn-dot{background:var(--green)}
.conn-pill.demo .conn-dot{background:var(--klein)}

/* ── 主布局 ── */
.layout{
  display:grid;
  grid-template-columns:360px 1fr 360px;
  height:100vh;                 /* 顶栏已移入左栏,布局占满全高,中/右栏顶到浏览器顶部 */
  background:var(--line);
  gap:0;
}
/* 三栏外壳 */
.col{display:flex;flex-direction:column;overflow:hidden;min-height:0}
.col-left{background:var(--canvas);color:var(--ink)}
.col-mid{background:var(--bar-mid)}
.col-right{background:var(--canvas);color:var(--ink)}

/* ── 左栏：功能区(深蓝) ── */
.side-scroll{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:22px;min-height:0}
.side-block{display:flex;flex-direction:column;gap:10px}
.side-block-grow{flex:none;min-height:0}
.side-block-grow #ability-body{overflow:visible}
.side-label{
  font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--ink-3);display:flex;align-items:center;gap:8px;
}
.side-label .count{margin-left:auto}
/* 可折叠区块 */
.collapse-head{cursor:pointer;user-select:none}
.collapse-arrow{display:inline-block;transition:transform .15s;font-size:9px;color:var(--ink-3)}
.collapsible:not(.collapsed) .collapse-arrow{transform:rotate(90deg)}
.collapsible.collapsed > *:not(.collapse-head){display:none !important}  /* 压过 #ability-body 的 ID 规则 */
.side-foot{padding:14px 16px;border-top:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;gap:10px}
.side-foot #btn-settings{flex:1;min-width:0}          /* 设置按钮缩短,让出右侧状态位 */
.side-foot .conn-pill{flex-shrink:0;background:#fff;border:1px solid var(--line)}  /* 白底+描边,在浅色页脚里与按钮同视觉、不糊成一片 */
.btn-block{width:100%;justify-content:center}

/* 浅色栏上的搜索框(与右栏同配色) */
.col-left .search-box{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:#fff;border:1px solid var(--line);
  border-radius:var(--r-s);color:var(--ink);transition:background .15s,border-color .15s;
}
.col-left .search-box:focus-within{border-color:var(--green)}
.col-left .search-box svg{color:var(--ink-3);flex-shrink:0}
.col-left .search-box input{
  flex:1;border:none;background:none;outline:none;color:var(--ink);
  font-size:13.5px;font-family:inherit;
}
.col-left .search-box input::placeholder{color:var(--ink-3)}

/* 浅色栏上的检索模式切换 */
.col-left .modes{display:flex;gap:5px;flex-wrap:wrap}
.col-left .mode-btn{
  flex:1;min-width:0;padding:7px 4px;border-radius:6px;font-size:12px;font-weight:600;
  border:1px solid var(--line);background:#fff;
  color:var(--ink-2);cursor:pointer;transition:all .14s;font-family:inherit;
}
.col-left .mode-btn:hover{background:var(--canvas);border-color:var(--ink-3)}
.col-left .mode-btn.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}

/* 次级按钮(浅色) */
.btn-ghost-dark{
  background:#fff;border:1px solid var(--line);color:var(--ink-2);
}
.btn-ghost-dark:hover{background:var(--canvas);color:var(--ink)}

/* 中栏:适应视图按钮浮层(画布右上角,替代原绿色标题栏) */
.graph-fit{position:absolute;top:14px;right:14px;z-index:5;width:32px;height:32px;
  display:grid;place-items:center;border-radius:8px;cursor:pointer;
  color:rgba(243,245,249,.75);background:rgba(20,28,40,.55);border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(8px);transition:all .15s}
.graph-fit:hover{color:#fff;background:rgba(20,28,40,.82)}

/* 右栏标题条 + 深炭适配 */
/* 右栏标题条:克莱因蓝底(与中栏绿对冲) */
.col-right .panel-head{background:var(--klein);border-bottom:none}
.col-right .panel-head h2{color:#fff}
.col-right .panel-head .icon-btn{color:rgba(255,255,255,.85)}
.col-right .panel-head .icon-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.icon-btn-dark{color:var(--on-dark-2)}
.icon-btn-dark:hover{background:rgba(255,255,255,.10);color:var(--on-dark)}
.col-right #wiki-body{flex:1;overflow-y:auto;padding:18px;min-height:0}
.col-right .wiki-empty{color:var(--ink-3)}
.col-right .wiki-empty svg{color:var(--ink-3);opacity:.5}

/* ── 左栏(深蓝)内的卡片深色适配 ── */
/* 能力卡片:纵向堆叠 + 半透明白底 */
.col-left #ability-body{
  padding:0;display:flex;flex-direction:column;gap:10px;
  overflow-x:visible;overflow-y:auto;
}
.col-left .ability-card{
  width:auto;flex-shrink:0;
  background:#fff;border:1px solid var(--line);
}
.col-left .ability-card:hover{border-color:var(--green);background:var(--canvas)}
.col-left .ac-name{color:var(--ink)}
.col-left .ac-domain{color:var(--ink-3)}
.col-left .ac-icon{background:rgba(44,150,120,.14);color:var(--green)}
.col-left .ac-cov-label{color:var(--ink-2)}
.col-left .ac-cov-track{background:rgba(0,0,0,.08)}
.col-left .ac-cov-bar{background:var(--green)}        /* 覆盖度进度条:绿 */
.col-left .ac-cov-pct{color:var(--green)}
.col-left .ac-ready{color:var(--green)}
.col-left .ac-status{color:var(--ink-3)}

/* 冲突卡片(浅色) */
.col-left #conflict-body{padding:0;gap:10px;overflow-y:visible}
.col-left .conflict-card{
  background:#fff;border:1px solid var(--line);
  border-left:3px solid var(--alert);
}
.col-left .cc-domain{color:var(--alert);background:rgba(176,65,62,.10)}
.col-left .cc-claim{background:var(--canvas)}
.col-left .cc-claim:hover{border-color:var(--klein)}
.col-left .cc-claim.picked{border-color:var(--green);background:rgba(44,150,120,.12)}
.col-left .cc-claim-txt{color:var(--ink)}
.col-left .cc-claim-conf{color:var(--klein)}        /* 置信度数值:克莱因蓝 */
.col-left .cc-vs{color:var(--ink-3)}
.col-left .count{background:rgba(0,0,0,.06);color:var(--ink-2)}
.col-left .count-alert{background:rgba(176,65,62,.12);color:var(--alert)}

/* ── 右栏(深炭)词条详情深色适配 ── */
.col-right .wiki-title{color:var(--ink)}
.col-right .wiki-domain{color:var(--ink-3)}
.col-right .wiki-summary{color:var(--ink-2)}
.col-right .wiki-section h4{color:var(--ink-3)}
/* 原文段落 + 书关键词 */
.wiki-source{margin-top:6px;font-size:13px;line-height:1.8;color:var(--ink-1,#1d2129);
  background:rgba(44,150,120,.07);border-left:3px solid var(--green);
  padding:12px 14px;border-radius:0 8px 8px 0;
  height:auto;max-height:460px;overflow-y:auto;  /* 自适应内容:短则小,长则大,超长才滚动 */
  white-space:pre-wrap;word-break:break-word}
/* 相关事实/观点:固定高度框 + 内部滚动,省纵向空间 */
.wiki-scroll{max-height:200px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;
  padding:6px 8px;background:rgba(0,0,0,.015)}
/* AI 综述(第2档) */
.synth-btn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  font-size:13px;font-weight:600;color:#fff;background:var(--green);
  border:none;border-radius:8px;padding:8px 14px}
.synth-btn:hover{background:var(--green-d,#237a61)}
.synth-btn.ghost{background:#fff;color:var(--green);border:1px solid var(--green);margin-top:8px;padding:6px 12px;font-size:12px}
.synth-hint{margin-top:6px;font-size:11px;color:var(--ink-3);line-height:1.6}
.synth-loading{font-size:13px;color:var(--ink-2);padding:8px 0}
.synth-body{margin-top:4px;font-size:13px;line-height:1.85;color:var(--ink-1,#1d2129);
  background:rgba(0,47,167,.05);border-left:3px solid var(--klein);
  padding:12px 14px;border-radius:0 8px 8px 0;white-space:normal;word-break:break-word}
.synth-meta{margin-top:6px;font-size:11px;color:var(--ink-3)}
/* 路径查询 */
.path-ctl{display:flex;gap:8px;flex-wrap:wrap}
.path-meta{margin-top:8px;font-size:12px;color:var(--ink-2)}
.path-result{margin-top:8px;font-size:12px;line-height:1.7;color:var(--ink-1,#1d2129);
  background:rgba(44,150,120,.07);border-left:3px solid var(--green);
  padding:8px 12px;border-radius:0 8px 8px 0;word-break:break-word}
.wiki-scroll .wiki-item{margin-top:4px}
.wiki-scroll .wiki-item:first-child{margin-top:0}
/* 关联关键词:小星球式散点 */
.kw-cluster{width:100%;height:180px;border:1px solid var(--line);border-radius:10px;
  background:radial-gradient(circle at 50% 45%, rgba(44,150,120,.06), transparent 70%);overflow:hidden}
.kw-cluster svg{width:100%;height:100%;display:block}
.kw-cluster svg circle{cursor:pointer;transition:stroke-width .1s}
.kw-cluster svg circle:hover{stroke:#fff;stroke-width:2}
.kw-cluster-cap{text-align:center;font-size:11.5px;color:var(--ink-3);margin-top:3px}
.kw-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.kw-chip{font-size:12px;padding:3px 9px;border-radius:12px;cursor:pointer;
  background:rgba(44,150,120,.12);color:var(--green);transition:background .14s;white-space:nowrap}
.kw-chip:hover{background:rgba(44,150,120,.24)}
/* 综合页:相关事实/观点条目 */
.wiki-item{font-size:12.5px;line-height:1.6;color:var(--ink-2);padding:7px 10px;margin-top:5px;
  border-radius:7px;background:rgba(0,0,0,.03);border-left:3px solid transparent;cursor:pointer;
  transition:background .14s;word-break:break-word}
.wiki-item:hover{background:rgba(0,0,0,.06)}
.wiki-item.fact{border-left-color:var(--klein)}
.wiki-item.claim{border-left-color:var(--green)}
.wiki-item .wiki-conf{float:right;margin-left:8px;font-size:11px;font-weight:700;color:var(--klein)}
.col-right .conf-bar{background:rgba(0,0,0,.08)}
.col-right .conf-fill{background:var(--klein)}              /* 置信度条:克莱因蓝 */
.col-right .conf-val{color:var(--klein)}                    /* 置信度数值:克莱因蓝 */
.col-right .conf-row{color:var(--ink-2)}
.col-right .evid-item{border-left-color:var(--klein-l)}
.col-right .evid-src{color:var(--klein)}                   /* Evidence 引用:克莱因蓝 */
.col-right .evid-meta{color:var(--ink-3)}
.col-right .tag{color:var(--green);background:var(--green-12)}
.col-right .rel-item:hover{background:rgba(0,0,0,.04)}
.col-right .rel-type{color:var(--ink-3);background:rgba(0,0,0,.05)}
.col-right .rel-name{color:var(--klein)}                   /* 关联节点名:克莱因蓝(链接) */
.col-right .st-active{background:var(--green-12);color:var(--green)}  /* active:绿 */
.col-right .st-pending{background:var(--klein-12);color:var(--klein)}
.col-right .wiki-type{background:rgba(0,0,0,.05)}
.panel{background:var(--canvas);overflow:hidden;position:relative;display:flex;flex-direction:column}
.panel-head{
  display:flex;align-items:center;gap:9px;
  padding:13px 18px;border-bottom:1px solid var(--line);
  background:var(--white);flex-shrink:0;
}
.panel-head h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2)}
.panel-head .count{
  font-size:11px;font-weight:700;color:var(--green);
  background:var(--green-12);padding:2px 8px;border-radius:20px;
}
.panel-head .tools{margin-left:auto;display:flex;gap:6px}
.icon-btn{
  width:28px;height:28px;border:none;background:var(--canvas);border-radius:6px;
  cursor:pointer;color:var(--ink-2);display:grid;place-items:center;transition:all .15s;
}
.icon-btn:hover{background:var(--line-2);color:var(--ink)}
.icon-btn.on{background:var(--green-12);color:var(--green)}

/* 图谱画布 */
#graph-canvas{flex:1;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 30% 25%, rgba(45,150,120,.10), transparent 55%),
    radial-gradient(ellipse at 72% 70%, rgba(0,47,167,.16), transparent 55%),
    radial-gradient(circle at 50% 50%, #1a2230 0%, #0d1119 70%, #080a0f 100%);
}
/* 星点(CSS 多重 radial,静态星空) */
#graph-canvas::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.7;
  background-image:
    radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 28% 64%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 44% 14%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 62% 48%, rgba(255,255,255,.45), transparent),
    radial-gradient(1px 1px at 78% 28%, rgba(255,255,255,.6), transparent),
    radial-gradient(1px 1px at 88% 74%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 18% 86%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 54% 82%, rgba(255,255,255,.4), transparent),
    radial-gradient(1.5px 1.5px at 36% 40%, rgba(159,232,210,.5), transparent),
    radial-gradient(1.5px 1.5px at 68% 60%, rgba(125,151,255,.5), transparent);
}
#graph-canvas canvas{display:block;position:relative;z-index:1}

.graph-legend{
  position:absolute;left:16px;bottom:16px;
  background:rgba(20,28,40,.72);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r);backdrop-filter:blur(8px);
  padding:11px 13px;font-size:11px;
  display:flex;flex-direction:column;gap:7px;z-index:5;
}
.lg-row{display:flex;align-items:center;gap:7px;color:rgba(243,245,249,.82);font-weight:500}
.lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.graph-hint{
  position:absolute;top:16px;left:16px;
  font-size:11px;color:rgba(243,245,249,.7);background:rgba(20,28,40,.66);
  padding:6px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(8px);z-index:5;font-weight:500;
}

/* ── 右侧 Wiki ── */
#wiki-body{flex:1;overflow-y:auto;padding:0}
.wiki-empty{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--ink-3);text-align:center;padding:40px 30px;
}
.wiki-empty svg{opacity:.4}
.wiki-empty p{font-size:13px;line-height:1.5}

.wiki-card{padding:20px}
.wiki-type{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:4px 10px;border-radius:20px;margin-bottom:12px;
}
.wiki-title{font-size:21px;font-weight:750;letter-spacing:-.01em;line-height:1.25;margin-bottom:6px}
.wiki-domain{font-size:12px;color:var(--ink-3);font-weight:600;margin-bottom:16px}
.wiki-summary{font-size:13.5px;color:var(--ink-2);line-height:1.6;margin-bottom:18px}

.wiki-section{margin-bottom:18px}
.wiki-section h4{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--ink-3);margin-bottom:9px;display:flex;align-items:center;gap:6px;
}
.conf-bar{height:7px;background:var(--line-2);border-radius:4px;overflow:hidden;margin-top:5px}
.conf-fill{height:100%;border-radius:4px;background:var(--klein);transition:width .4s}
.conf-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12px}
.conf-val{font-weight:750;color:var(--klein);font-size:15px;font-variant-numeric:tabular-nums}

.evid-item{
  border-left:2px solid var(--klein-20);padding:7px 0 7px 12px;margin-bottom:8px;
}
.evid-src{font-size:12.5px;font-weight:650;color:var(--ink)}
.evid-meta{font-size:11px;color:var(--ink-3);margin-top:2px}

.tag-row{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;font-weight:600;color:var(--green-d);background:var(--green-12);
  padding:3px 9px;border-radius:6px}

.rel-item{
  display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;
  cursor:pointer;transition:background .15s;font-size:12.5px;
}
.rel-item:hover{background:var(--white)}
.rel-type{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--ink-3);
  background:var(--canvas);padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.rel-name{color:var(--klein);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.status-badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:3px 8px;border-radius:5px;
}
.st-active{background:var(--green-12);color:var(--green-d)}
.st-pending{background:var(--klein-12);color:var(--klein)}
.st-disputed{background:var(--alert-12);color:var(--alert)}
.st-superseded{background:var(--line-2);color:var(--ink-3)}

/* ── 底部左：能力卡 ── */
#ability-body{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px 18px;display:flex;gap:13px}
.ability-card{
  flex-shrink:0;width:262px;background:var(--white);
  border:1px solid var(--line);border-radius:var(--r);padding:15px;
  display:flex;flex-direction:column;gap:10px;transition:all .15s;
}
.ability-card:hover{border-color:var(--green-20);box-shadow:var(--shadow)}
.ac-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ac-name{font-size:14px;font-weight:700;letter-spacing:-.01em}
.ac-domain{font-size:11px;color:var(--ink-3);font-weight:600;margin-top:1px}
.ac-icon{width:30px;height:30px;border-radius:8px;background:var(--green-12);
  display:grid;place-items:center;color:var(--green);flex-shrink:0}
.ac-cov-list{display:flex;flex-direction:column;gap:6px}
.ac-cov-row{display:flex;align-items:center;gap:8px}
.ac-cov-label{font-size:11px;color:var(--ink-2);width:88px;flex-shrink:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.ac-cov-track{flex:1;height:6px;background:var(--line-2);border-radius:3px;overflow:hidden}
.ac-cov-bar{height:100%;background:var(--green);border-radius:3px;transition:width .5s}
.ac-cov-pct{font-size:10px;font-weight:700;color:var(--green-d);width:30px;text-align:right;
  font-variant-numeric:tabular-nums}
.ac-foot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:4px}
.ac-status{font-size:11px;font-weight:600;flex:1}
.ac-ready{color:var(--green)}
.ac-locked{color:var(--ink-3)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:6px}
.btn-compile{background:var(--green);color:#fff}
.btn-compile:hover{background:var(--green-d)}
.btn-compile:disabled{background:var(--line-2);color:var(--ink-3);cursor:not-allowed}

/* ── 底部右：冲突 ── */
#conflict-body{flex:1;overflow-y:auto;padding:13px 16px;display:flex;flex-direction:column;gap:10px}
.conflict-empty{height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;color:var(--ink-3);text-align:center}
.conflict-empty svg{color:var(--green);opacity:.6}
.conflict-card{
  background:var(--white);border:1px solid var(--line);border-left:3px solid var(--alert);
  border-radius:var(--r-s);padding:12px;
}
.cc-head{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.cc-domain{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--alert);
  background:var(--alert-12);padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.cc-claim{padding:8px;border-radius:6px;background:var(--canvas);margin-bottom:6px;cursor:pointer;
  transition:background .15s;border:1.5px solid transparent}
.cc-claim:hover{border-color:var(--klein-20)}
.cc-claim.picked{border-color:var(--green);background:var(--green-12)}
.cc-claim-txt{font-size:12px;color:var(--ink);line-height:1.4}
.cc-claim-conf{font-size:10px;color:var(--ink-3);font-weight:600;margin-top:3px;
  font-variant-numeric:tabular-nums}
.cc-vs{text-align:center;font-size:10px;font-weight:700;color:var(--ink-3);margin:2px 0}
.cc-resolve{display:flex;gap:6px;margin-top:9px}
.cc-resolve .btn-sm{flex:1;justify-content:center}

/* ── 模态 ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(26,29,36,.4);z-index:100;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
.modal-bg.show{display:flex}
.modal{
  background:var(--white);border-radius:14px;width:540px;max-width:92vw;
  box-shadow:var(--shadow-lg);overflow:hidden;
  animation:pop .2s ease;
}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:700}
.modal-body{padding:22px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field input,.field textarea,.field select{
  width:100%;border:1.5px solid var(--line);border-radius:var(--r-s);
  padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s;resize:vertical;
}
.field input:focus,.field textarea:focus,.field select:focus{
  border-color:var(--green);box-shadow:0 0 0 3px var(--green-12)}
.field textarea{min-height:120px;line-height:1.5}
/* 文件/文件夹上传 */
.upload-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:6px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.file-list{margin-top:10px;display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--klein-12);
  border:1px solid var(--line);border-radius:var(--r-s);font-size:13px;color:var(--ink-2)}
.file-item .fi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fi-size{color:var(--ink-3);font-size:12px;flex-shrink:0}
.file-item .fi-del{cursor:pointer;color:var(--ink-3);flex-shrink:0;display:flex;border:none;background:none;padding:2px}
.file-item .fi-del:hover{color:var(--alert)}
.file-item.fi-done{background:var(--green-12)}
.file-item.fi-err{background:var(--alert-12)}
.file-item .fi-stat{font-size:12px;flex-shrink:0}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;align-items:center;padding:0 22px 22px}
.ingest-status{margin-right:auto;text-align:left;font-size:12.5px;line-height:1.5;min-height:1px}
.ingest-status .ing-line{display:flex;align-items:center;gap:6px;color:var(--ink-1,#1d2129)}
.ingest-status .ing-line .spinner{border-top-color:var(--green)}
.ingest-status .ing-hint{color:var(--ink-3);font-size:11.5px;margin-top:2px}

/* toast */
#toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:var(--r);
  font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:9px;animation:slideUp .25s ease;max-width:440px;
}
.toast.ok{background:var(--green-d)}
.toast.err{background:var(--alert)}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* loading */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* scrollbar */
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}
::-webkit-scrollbar-track{background:transparent}

@media (max-width:1100px){
  .layout{grid-template-columns:1fr 320px}
}
</style>
</head>
<body>
<div class="layout">
  <!-- ░░ 左栏：功能区(顶部含品牌栏) ░░ -->
  <aside class="col col-left">
    <div class="topbar">
      <div class="brand">
        <div class="mark">H</div>
        <span>Hestia Knowledge Core</span>
        <span class="ver" id="app-ver">v1.0</span>
      </div>
    </div>
    <div class="side-scroll">
      <!-- 搜索 -->
      <div class="side-block">
        <div class="side-label">搜索</div>
        <div class="search-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="search-input" placeholder="搜索知识、概念、观点…" autocomplete="off">
        </div>
        <div class="modes" id="modes">
          <button class="mode-btn on" data-mode="hybrid">混合</button>
          <button class="mode-btn" data-mode="bm25">关键词</button>
          <button class="mode-btn" data-mode="vector">语义</button>
          <button class="mode-btn" data-mode="graph">图谱</button>
        </div>
      </div>

      <!-- 主操作 -->
      <div class="side-block">
        <div class="side-label">知识录入</div>
        <button class="btn btn-primary btn-block" id="btn-ingest">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
          摄入知识
        </button>
      </div>

      <!-- 能力编译(可折叠,默认折叠 —— 把知识编译成 Agent 可调用的能力包 .hkap) -->
      <div class="side-block side-block-grow collapsible collapsed" id="ability-block">
        <div class="side-label collapse-head" onclick="toggleCollapse('ability-block')">
          <span class="collapse-arrow">▸</span>能力编译 <span class="count" id="ability-count">0 项</span>
        </div>
        <div id="ability-body"></div>
      </div>

      <!-- 冲突裁决 -->
      <div class="side-block">
        <div class="side-label">冲突裁决 <span class="count count-alert" id="conflict-count">0</span></div>
        <div id="conflict-body"></div>
      </div>
    </div>

    <!-- 底部设置 -->
    <div class="side-foot">
      <button class="btn btn-ghost-dark" id="btn-settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        连接设置
      </button>
      <div class="conn-pill demo" id="conn-pill">
        <span class="conn-dot"></span><span id="conn-text">演示模式</span>
      </div>
    </div>
  </aside>

  <!-- ░░ 中栏：知识图谱 ░░ -->
  <section class="col col-mid" id="graph-panel">
    <div id="graph-canvas">
      <button class="graph-fit" id="btn-fit" title="适应视图（重置相机）">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
      </button>
      <div class="graph-hint">点击节点查看详情 · 悬停放大 · 滚轮缩放</div>
      <div class="graph-legend" id="legend"></div>
    </div>
  </section>

  <!-- ░░ 右栏：词条详情 ░░ -->
  <aside class="col col-right" id="wiki-panel">
    <div id="wiki-body">
      <div class="wiki-empty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <p>点击图谱中的节点<br>查看知识单元详情</p>
      </div>
    </div>
  </aside>
</div>

<!-- 摄入模态 -->
<div class="modal-bg" id="ingest-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>摄入知识</h3>
      <button class="icon-btn" data-close><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>文本内容</label>
        <textarea id="ingest-text" placeholder="粘贴书籍段落、文章、笔记…&#10;系统会自动拆解为实体、概念、事实、观点，并检测冲突。"></textarea>
      </div>

      <div class="field">
        <label>或上传文件 / 文件夹<span style="color:var(--ink-3);font-weight:400">（支持 .pdf .md .txt .epub .mobi .azw3，可多选）</span></label>
        <div class="upload-row">
          <button type="button" class="btn btn-ghost btn-sm" id="btn-pick-files">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg>
            选择文件
          </button>
          <button type="button" class="btn btn-ghost btn-sm" id="btn-pick-folder">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            选择文件夹
          </button>
          <input type="file" id="ingest-files" multiple accept=".pdf,.md,.markdown,.txt,.epub,.mobi,.azw3,.azw" hidden>
          <input type="file" id="ingest-folder" webkitdirectory directory multiple hidden>
        </div>
        <div id="file-list" class="file-list"></div>
      </div>

      <div class="field">
        <label>或摄入网页<span style="color:var(--ink-3);font-weight:400">（填网址，自动抓取正文后抽取）</span></label>
        <input id="ingest-url" placeholder="https://example.com/article">
      </div>

      <div class="field">
        <label>来源标题<span style="color:var(--ink-3);font-weight:400">（上传文件时可留空，自动用文件名）</span></label>
        <input id="ingest-title" placeholder="如：穷查理宝典">
      </div>
      <div class="field">
        <label>领域</label>
        <select id="ingest-domain">
          <option value="Investment">投资 Investment</option>
          <option value="Psychology">心理学 Psychology</option>
          <option value="Engineering">工程 Engineering</option>
          <option value="Nutrition">营养 Nutrition</option>
          <option value="">（不指定）</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <div id="ingest-status" class="ingest-status"></div>
      <button class="btn btn-ghost" data-close>取消</button>
      <button class="btn btn-primary" id="btn-ingest-submit">开始摄入</button>
    </div>
  </div>
</div>

<!-- 设置模态 -->
<div class="modal-bg" id="settings-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>连接设置</h3>
      <button class="icon-btn" data-close><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>HKC API 地址</label>
        <input id="api-url" placeholder="http://localhost:8000" value="http://localhost:8000">
      </div>
      <div class="field">
        <label>API Key<span style="color:var(--ink-3);font-weight:400">（可选，仅当后端设了 HKC_API_KEY 时需要）</span></label>
        <input id="api-key" type="password" placeholder="留空即可（本地默认无鉴权）" autocomplete="off">
      </div>

      <div class="field" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)">
        <label>知识抽取模型（摄入知识时使用）</label>
        <select id="llm-provider" style="width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--white);color:var(--ink)">
          <option value="deepseek">DeepSeek</option>
          <option value="anthropic">Claude (Anthropic)</option>
          <option value="openai">OpenAI</option>
          <option value="openai-compatible">自定义 / 本地模型 (OpenAI 兼容)</option>
        </select>
      </div>
      <div class="field">
        <label>API Key <span style="color:var(--ink-3);font-weight:400">（记在本浏览器，刷新不丢；换设备需重填）</span></label>
        <input id="llm-key" type="password" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="field" id="llm-model-field">
        <label>模型名称 <span style="color:var(--ink-3);font-weight:400">（留空用默认）</span></label>
        <input id="llm-model" placeholder="deepseek-chat">
      </div>
      <div class="field" id="llm-baseurl-field" style="display:none">
        <label>API 地址 (Base URL)</label>
        <input id="llm-baseurl" placeholder="http://localhost:11434/v1">
      </div>

      <p style="font-size:12.5px;color:var(--ink-2);line-height:1.6">
        填入运行中的 <code style="background:var(--canvas);padding:1px 5px;border-radius:4px">hkc-api</code> 地址并连接，使用真实数据。
        连接后会把上面的模型配置发送给后端。连接失败或未填写时，界面使用内置演示数据，可离线预览。
      </p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="btn-use-demo">使用演示数据</button>
      <button class="btn btn-primary" id="btn-connect">连接</button>
    </div>
  </div>
</div>

<div id="toast-wrap"></div>

// ── API 客户端：连真实 hkc-api，失败回退演示 ──
class HKCClient{
  constructor(){ this.base=null; this.demo=true; this.apiKey=''; }
  async connect(url){
    try{
      const r=await fetch(url.replace(/\/$/,'')+'/health',{signal:AbortSignal.timeout(4000)});
      if(!r.ok) throw 0;
      this.base=url.replace(/\/$/,''); this.demo=false; return true;
    }catch(e){ this.demo=true; this.base=null; return false; }
  }
  useDemo(){ this.demo=true; this.base=null; }
  // 后端若设了 HKC_API_KEY，前端在此带上 X-API-Key；未配置则为空、不影响开放部署。
  _h(extra){ const h=Object.assign({}, extra||{}); if(this.apiKey) h['X-API-Key']=this.apiKey; return h; }
  async _get(p){ const r=await fetch(this.base+p,{headers:this._h()}); if(!r.ok) throw new Error(r.status); return r.json(); }
  async _post(p,b){ const r=await fetch(this.base+p,{method:'POST',headers:this._h({'Content-Type':'application/json'}),body:JSON.stringify(b)});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw {status:r.status,detail:e.detail}; } return r.json(); }
  async _postForm(p,fd){ const r=await fetch(this.base+p,{method:'POST',headers:this._h(),body:fd});  // 不设 Content-Type，浏览器自动带 multipart boundary
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw {status:r.status,detail:e.detail}; } return r.json(); }
}

// ── 载入数据（演示或真实）──
async function loadData(){
  if(client.demo){
    state.kus=JSON.parse(JSON.stringify(DEMO.kus));
    state.relations=DEMO.relations.map(r=>({...r}));
    state.abilities=DEMO.abilities.map(a=>({...a}));
    state.conflicts=DEMO.conflicts.map(c=>({...c}));
  }else{
    // 真实模式：一次拉取全量知识图谱（所有 KU + 关系），不再写死领域
    try{
      const g=await client._get('/knowledge/graph?limit=5000');   // 拉到后端硬上限(默认仅 2000)
      state.kus={};
      (g.kus||[]).forEach(k=>{ state.kus[k.ku_id]=k; });
      state.relations=(g.relations||[]).map(r=>({
        from:r.from_ku, to:r.to_ku, type:r.rel_type||'RELATED',
      }));
      const ab=await client._get('/abilities').catch(()=>({abilities:[]}));
      state.abilities=[];
      for(const key of (ab.abilities||[])){
        const rep=await client._get(`/abilities/${key}/coverage`).catch(()=>null);
        if(rep) state.abilities.push({ability_key:key,display_name:rep.display_name||key,
          domain:(rep.domains||[]).join(' / '),
          coverage:rep.coverage,can_compile:rep.can_compile,missing:rep.missing_skills});
      }
      // 冲突
      const cf=await client._get('/conflicts?status=open').catch(()=>({conflicts:[]}));
      state.conflicts=cf.conflicts||[];
      // 数据可见性安全网:拉 /stats 拿真实 data_dir + 全库 KU 总数,
      // 显示到连接胶囊(hover)+ toast,空库时明显告警——防止"连错目录以为数据丢了"。
      updateDataInfo().catch(()=>{});
    }catch(e){ toast('数据加载出错，回退演示模式','err'); client.useDemo(); return loadData(); }
  }
  renderAll();
}

  const total=st.total_kus||0;              // 全库真实总数

    let tip=`数据目录：${dir}\n全库知识：${total} 个`;
    if(shown<total) tip+=`\n星球显示：${shown} 个（受上限限制，未全部显示）`;

    pill.title=tip;

    toast(`⚠️ 知识库为空！后端数据目录：${dir}\n若你之前上传过书，很可能是后端连错了目录`,'err');

    let msg=`已连接 · 全库 ${total} 个知识`;
    if(shown<total) msg+=` · 星球显示 ${shown} 个（达上限）`;
    toast(msg,'ok');
  }

// 节点半径（3D 世界单位）
function nodeRadius(k){
  if(k.ku_type==='Ability') return 7;
  if(k.ku_type==='Entity'||k.ku_type==='Concept') return 6;
  if(k.ku_type==='Claim') return 3.5 + (k.confidence||0.5)*3;
  return 5;
}

// ── 星球布局策略(伸缩的统一接入点)────────────────────────────
// 所有"节点/标签太多放不下怎么办"的逻辑都集中在此,后续扩展只改这个对象,
// 不动其它渲染代码:
//   已实现 · 单层 Fibonacci 球面 + 圆点随节点总数自适应缩小(dotScale)。
//   预留接入点 ↓
//   · shells>1     → 分层多壳星球(外壳放不下→往里再套一层球);position() 已按
//                    shell 分配、内层半径递减,只需让 compute() 返回 shells>1 即启用。
//   · labelScale   → 书名标签随书数自适应缩小(_makeLabel 已乘该系数)。
//   · SHELL_CAPACITY→ 单层舒适容量阈值,决定何时缩点 / 何时该分层。
const PLANET_LAYOUT = {
  SHELL_CAPACITY: 800,          // 单层舒适容量;超过开始缩点,(未来)超过可分层
  BASE_R_MIN: 160, BASE_R_MAX: 320,

  // 按节点总数计算布局参数(集中调参)
  compute(n){
    const radius     = Math.max(this.BASE_R_MIN, Math.min(this.BASE_R_MAX, 90 + n*11));
    const dotScale   = Math.max(0.45, Math.min(1, Math.sqrt(this.SHELL_CAPACITY / Math.max(1, n))));
    const shells     = 1;       // 预留:未来 Math.ceil(n/SHELL_CAPACITY) 启用分层
    const labelScale = 1;       // 预留:未来书多时缩小书名标签
    return { radius, dotScale, shells, labelScale };
  },

  // 第 i 个节点(共 n 个)的球面坐标。已支持多壳:shells>1 时按层分配、内层半径递减;
  // shells=1 时退化为单层 Fibonacci,布局与旧版完全一致。
  position(i, n, params, T){
    const golden = Math.PI * (3 - Math.sqrt(5));
    const shells = params.shells || 1;
    const per    = Math.ceil(n / shells);
    const shell  = Math.floor(i / per);
    const localI = i - shell * per;
    const localN = Math.max(1, Math.min(per, n - shell * per));
    const r      = params.radius * (1 - shell * 0.32);   // 内层半径递减
    const y      = 1 - (localI / Math.max(1, localN - 1)) * 2;
    const rad    = Math.sqrt(Math.max(0, 1 - y*y));
    const theta  = golden * localI;
    return new T.Vector3(Math.cos(theta)*rad*r, y*r, Math.sin(theta)*rad*r);
  },
};

// ── 知识星球类 ──
class KnowledgePlanet {
  constructor(container, THREE){
    this.T = THREE;
    this.container = container;
    this.nodes = [];      // {id, ku, mesh, glow, vel, pos, radius, label}
    this.edges = [];      // {from, to, line, contradicts}
    this.raf = null;
    this.disposed = false;
    this.hovered = null;
    this.selected = null;
    this._initScene();
  }

  _initScene(){
    const T = this.T;
    const w = this.container.clientWidth || 700;
    const h = this.container.clientHeight || 600;

    this.scene = new T.Scene();

    // 相机
    this.camera = new T.PerspectiveCamera(55, w/h, 1, 4000);
    this.camera.position.set(0, 0, 720);

    // 渲染器
    this.renderer = new T.WebGLRenderer({ antialias:true, alpha:true });
    this.renderer.setSize(w, h);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
    this.renderer.setClearColor(0x000000, 0);  // 透明，露出 CSS 星空背景
    this.container.appendChild(this.renderer.domElement);
    this.canvas = this.renderer.domElement;
    this.canvas.style.display = 'block';

    // 灯光：环境光 + 两个点光（冷暖对冲，呼应品牌绿/蓝）
    this.scene.add(new T.AmbientLight(0xffffff, 0.75));
    const l1 = new T.PointLight(0x9fe8d2, 0.9, 0); l1.position.set(200, 180, 300); this.scene.add(l1);
    const l2 = new T.PointLight(0x7d97ff, 0.7, 0); l2.position.set(-220, -120, 160); this.scene.add(l2);

    // 旋转容器：所有节点挂在这个 group 上，整体缓缓自转
    this.world = new T.Group();
    this.scene.add(this.world);

    // 轨道控制（自写：拖拽转视角 + 滚轮缩放）
    this._initControls();
  }

  // 轻量轨道控制
  _initControls(){
    this.rot = { x: 0, y: 0 };          // 目标旋转
    this.rotCur = { x: 0, y: 0 };       // 当前（缓动）
    this.autoSpin = true;
    this.camDist = 720;
    this.camDistTarget = 720;
    let dragging = false, lastX = 0, lastY = 0;

    const el = this.canvas;
    el.style.cursor = 'grab';

    this._onDown = (e)=>{ dragging = true; this.dragging = true; lastX = e.clientX; lastY = e.clientY; el.style.cursor='grabbing';
      this._downX = e.clientX; this._downY = e.clientY;   // 记录起点,用于区分"拖动"与"点击"
      // 接管当前视觉朝向再停自转,避免从摆动倾斜切到手动时跳变
      this.rot.x = this.rotCur.x; this.rot.y = this.rotCur.y; this.autoSpin = false;
      // 关键:清掉 flyTarget,否则聚焦态每帧把旋转拉回目标节点朝向 → 拖动被牵扯、松手即反弹
      this._flyTarget = null; };
    this._onMove = (e)=>{
      if(!dragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      this.rot.y += dx * 0.006;
      this.rot.x += dy * 0.006;   // 不再钳制俯仰:可自由翻转,把任意节点(含两极)拉到正面
    };
    this._onUp = ()=>{ dragging = false; this.dragging = false; el.style.cursor='grab'; };
    this._onWheel = (e)=>{
      e.preventDefault();
      this.camDistTarget += e.deltaY * 0.5;
      this.camDistTarget = Math.max(250, Math.min(1500, this.camDistTarget));
    };

    el.addEventListener('pointerdown', this._onDown);
    window.addEventListener('pointermove', this._onMove);
    window.addEventListener('pointerup', this._onUp);
    el.addEventListener('wheel', this._onWheel, { passive:false });
  }

  // 构建节点与边
  build(kus, relations){
    const T = this.T;
    const ids = Object.keys(kus);
    const n = ids.length;
    if(!n) return;

    // 稳定打散:后端按类型分组返回 KU,直接按序号布 Fibonacci 会把同类型节点
    // (尤其只有几个的"书"/Evidence)全挤到同一极点、标签叠成一坨。按 id 哈希
    // 稳定排序,让各类型均匀铺满球面(布局跨刷新稳定,不随机跳)。
    // 必须用有雪崩效应的哈希(FNV-1a+混合):id 是 EVD_0000000X 这类共享前缀、
    // 仅末位不同的序列,简单滚动哈希会给相近值 → 同前缀仍聚堆,起不到打散作用。
    const _h = s => {
      let h = 2166136261 >>> 0;
      for(let k=0;k<s.length;k++){ h ^= s.charCodeAt(k); h = Math.imul(h, 16777619); }
      h ^= h >>> 13; h = Math.imul(h, 0x5bd1e995); h ^= h >>> 15;
      return h >>> 0;
    };
    ids.sort((a,b)=> _h(a) - _h(b));

    // 布局参数(半径/圆点缩放/层数/标签缩放)统一由 PLANET_LAYOUT 计算,便于扩展
    const params = PLANET_LAYOUT.compute(n);
    this._layoutParams = params;   // 供 _makeLabel 读取 labelScale 等

    ids.forEach((id, i)=>{
      const ku = kus[id];
      const radius = nodeRadius(ku) * params.dotScale;   // 圆点随节点总数自适应缩小
      const pos = PLANET_LAYOUT.position(i, n, params, T);

      // 球体
      const color = new T.Color(KU_COLORS[ku.ku_type] || '#888');
      const geo = new T.SphereGeometry(radius, 24, 24);
      const mat = new T.MeshStandardMaterial({
        color, emissive: color.clone().multiplyScalar(0.35),
        roughness: 0.45, metalness: 0.15,
      });
      const mesh = new T.Mesh(geo, mat);
      mesh.position.copy(pos);
      mesh.userData.id = id;
      this.world.add(mesh);

      // 外发光（稍大的半透明球）
      const glowMat = new T.MeshBasicMaterial({ color, transparent:true, opacity:0.12, side:T.BackSide });
      const glow = new T.Mesh(new T.SphereGeometry(radius*1.6, 20, 20), glowMat);
      mesh.add(glow);

      // 冲突节点：暗红描边光环
      if(disputedOf(ku)){
        const ring = new T.Mesh(
          new T.SphereGeometry(radius*1.35, 20, 20),
          new T.MeshBasicMaterial({ color:0xb0413e, transparent:true, opacity:0.3, side:T.BackSide })
        );
        mesh.add(ring);
      }

      this.nodes.push({
        id, ku, mesh, glow, radius,
        pos: pos.clone(),
        vel: new T.Vector3(),
        basePos: pos.clone(),
        baseColor: color.clone(),         // 复用,避免每帧 new T.Color
        phase: Math.random()*Math.PI*2,   // 漂浮相位
      });

      // 文字标签（Sprite，始终面向相机）
      const label = this._makeLabel(ku.name);
      label.position.set(0, -(radius+9), 0);
      mesh.add(label);
      const _nd = this.nodes[this.nodes.length-1];
      _nd.label = label;
      // 分级标签(按重要度钻取):
      //  一级 = 书/来源(Evidence),默认在球面常显书名;
      //  二级/三级 = 点击后按连接数(degree)展开该节点 top-N 重要邻居标签。
      //  这样几十上百本默认只见几十个书名,清爽且可层层下钻。
      _nd.isBook = (ku.ku_type === 'Evidence');
      _nd.deg = 0;           // 连接数,建边后回填(作重要度)
      _nd._revealLabel = false;
      label.visible = _nd.isBook;
    });

    // 边（连线）
    const nodeById = {};
    this.nodes.forEach(nd=> nodeById[nd.id] = nd);
    (relations||[]).forEach(r=>{
      const a = nodeById[r.from], b = nodeById[r.to];
      if(!a || !b) return;
      const contradicts = r.type === 'CONTRADICTS';
      const mat = new T.LineBasicMaterial({
        color: contradicts ? 0xb0413e : 0x9aa3b8,
        transparent:true, opacity: contradicts ? 0.55 : 0.22,
      });
      const geo = new T.BufferGeometry().setFromPoints([a.pos.clone(), b.pos.clone()]);
      const line = new T.Line(geo, mat);
      line.visible = false;   // 默认不画边(大图会糊成一团);点中节点才显示它的连线
      this.world.add(line);
      this.edges.push({ from:a, to:b, line, contradicts });
    });

    // 连接数(degree)=重要度,用于钻取时挑 top-N 邻居标签
    this.edges.forEach(e=>{ e.from.deg++; e.to.deg++; });

    this._buildPicking();
  }

  // 射线拾取（hover / click）
  _buildPicking(){
    const T = this.T;
    this.raycaster = new T.Raycaster();
    this.pointer = new T.Vector2();
    this._meshes = this.nodes.map(n=>n.mesh);

    this._onPointerMove = (e)=>{
      const rect = this.canvas.getBoundingClientRect();
      this.pointer.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
      this.pointer.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
    };
    this._onClick = (e)=>{
      // 拖动松手也会带出一次 click;若指针移动过阈值,判定为拖动而非点击 → 忽略,
      // 否则空白处会 clearSelection 重开自转、有节点处会 selectKU 飞入,都表现为"反弹"。
      const moved = Math.hypot(e.clientX - (this._downX||0), e.clientY - (this._downY||0));
      if(moved > 6) return;
      const hit = this._pick();
      if(hit){ if(window.selectKU) window.selectKU(hit.id); }
      else { if(window.clearSelection) window.clearSelection(); }
    };
    this.canvas.addEventListener('pointermove', this._onPointerMove);
    this.canvas.addEventListener('click', this._onClick);
  }

  _pick(){
    if(!this.raycaster) return null;
    this.raycaster.setFromCamera(this.pointer, this.camera);
    const hits = this.raycaster.intersectObjects(this._meshes, false);
    if(hits.length){
      const id = hits[0].object.userData.id;
      return this.nodes.find(n=>n.id===id);
    }
    return null;
  }

  // 动画循环
  start(){
    const T = this.T;
    const tick = ()=>{
      if(this.disposed) return;
      this.raf = requestAnimationFrame(tick);
      this._update();
      this.renderer.render(this.scene, this.camera);
    };
    tick();
  }

  _update(){
    const T = this.T;
    const t = performance.now() * 0.001;

    // 自动自转(绕 Y 轴)——静默时缓慢转动(约 100s/圈)
    if(this.autoSpin) this.rot.y += 0.0011;

    // 旋转缓动；自转时让倾斜角缓慢大幅度上下摆动(±~77°),使两极也周期性
    // 转到正面,避免单轴自转把两极节点永久"沉"在顶/底而无法点击
    // (即用户要的"无固定方向转动、无重力沉淀")。
    const tiltX = this.autoSpin ? Math.sin(t*0.045)*1.35 : this.rot.x;
    // 拖动时近乎 1:1 跟手,消除"橡皮筋/反馈力牵扯"感;静默时才平滑缓动。
    const rotEase = this.dragging ? 0.85 : 0.08;
    this.rotCur.x += (tiltX - this.rotCur.x) * rotEase;
    this.rotCur.y += (this.rot.y - this.rotCur.y) * rotEase;
    this.world.rotation.x = this.rotCur.x;
    this.world.rotation.y = this.rotCur.y;

    // 相机距离缓动
    this.camDist += (this.camDistTarget - this.camDist) * 0.1;
    this.camera.position.z = this.camDist;

    // 飞入:把选中节点缓缓转到正面中心
    if(this._flyTarget){
      const nd = this._flyTarget;
      // 期望旋转:让节点world坐标朝向 +Z(正对相机)
      const p = nd.pos;
      const targetRotY = -Math.atan2(p.x, p.z);
      const targetRotX = Math.atan2(p.y, Math.sqrt(p.x*p.x+p.z*p.z));
      this.rot.y = targetRotY;
      this.rot.x = targetRotX;   // 不钳制:点击两极节点也能完整转到正面中心
    }

    // ── 球面分布 + 聚焦汇聚 ──
    // 正常态:节点固定在球面 + 轻微呼吸,整体自转
    // 聚焦态:点击某节点,相关节点汇聚到它周围并发光,无关节点淡出退远
    const nodes = this.nodes;
    nodes.forEach(nd=>{
      // 目标位置:有 focusPos(聚焦汇聚)用它,否则回球面 basePos
      let tx, ty, tz;
      if(nd.focusPos){
        tx = nd.focusPos.x; ty = nd.focusPos.y; tz = nd.focusPos.z;
      }else{
        const bx = Math.sin(t*0.5 + nd.phase)*1.0;
        const by = Math.cos(t*0.4 + nd.phase)*1.0;
        tx = nd.basePos.x + bx; ty = nd.basePos.y + by; tz = nd.basePos.z;
      }
      // 平滑移动到目标(汇聚/回归动画)
      const cur = nd.mesh.position;
      const ease = nd.focusPos ? 0.10 : 0.06;
      cur.x += (tx - cur.x)*ease;
      cur.y += (ty - cur.y)*ease;
      cur.z += (tz - cur.z)*ease;
      nd.pos.copy(cur);

      // 发光过渡:聚焦的相关节点发光增强,淡出的减弱
      const targetEmissive = nd.glowOn ? 1.0 : 0.35;
      nd._emi = (nd._emi===undefined?0.35:nd._emi) + (targetEmissive - (nd._emi||0.35))*0.12;
      if(nd.mesh.material && nd.mesh.material.emissive && nd.baseColor){
        nd.mesh.material.emissive.copy(nd.baseColor).multiplyScalar(nd._emi);
      }
      // 淡出:无关节点透明度降低
      const targetOpacity = (nd.dim ? 0.18 : 1.0);
      nd._op = (nd._op===undefined?1:nd._op) + (targetOpacity - (nd._op||1))*0.12;
      nd.mesh.material.opacity = nd._op;
      nd.mesh.material.transparent = nd._op < 0.99;
      // 标签分级可见性:
      //  - 聚焦态(选中了某节点):只显示发光簇(glowOn)+悬停的标签,淡出的隐藏
      //  - 默认态:只显示常显类型(Entity/Concept)+悬停的标签
      if(nd.label){
        const forced = (nd===this.hovered || nd.id===this.selected);
        // 分级:钻取态只显示当前选中节点点亮的 top-N 邻居(二级/三级);
        //       默认态只显示一级书名(Evidence);悬停/选中强制显示。
        // 分级后可见标签本就稀疏(默认≈书数、钻取≈7),不做背面剔除,
        // 否则仅有的几个书名会在球背面时被剔空,出现"无标签"空窗。
        const show = forced || (this.selected ? nd._revealLabel : nd.isBook);
        nd.label.visible = show;
        if(show) nd.label.material.opacity = nd._op;
      }
    });

    // 更新边的端点(只更新可见的边,省性能)
    this.edges.forEach(e=>{
      if(!e.line.visible) return;
      const arr = e.line.geometry.attributes.position.array;
      arr[0]=e.from.pos.x; arr[1]=e.from.pos.y; arr[2]=e.from.pos.z;
      arr[3]=e.to.pos.x;   arr[4]=e.to.pos.y;   arr[5]=e.to.pos.z;
      e.line.geometry.attributes.position.needsUpdate = true;
    });

    // hover 检测 + 放大（用 scale，不改几何，不抖）
    const hit = this._pick();
    if(hit !== this.hovered){
      if(this.hovered) this._setHover(this.hovered, false);
      if(hit) this._setHover(hit, true);
      this.hovered = hit;
      this.canvas.style.cursor = hit ? 'pointer' : 'grab';
    }
    // 平滑 scale
    this.nodes.forEach(nd=>{
      const target = (nd===this.hovered || nd.id===this.selected) ? 1.5 : 1.0;
      const s = nd.mesh.scale.x + (target - nd.mesh.scale.x)*0.18;
      nd.mesh.scale.set(s,s,s);
    });
  }

  _setHover(nd, on){ /* 状态切换占位，scale 在 _update 平滑处理 */ }

  // 生成文字标签 Sprite
  _makeLabel(text){
    const T = this.T;
    const label = (text||'').length>12 ? text.slice(0,11)+'…' : (text||'');
    const cv = document.createElement('canvas');
    const ctx = cv.getContext('2d');
    const fs = 48;
    ctx.font = `600 ${fs}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;
    const w = Math.ceil(ctx.measureText(label).width) + 24;
    cv.width = w; cv.height = fs+24;
    // 重设 font(canvas resize 后失效)
    ctx.font = `600 ${fs}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    // 半透明深色描边底,深空背景上清晰
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowBlur=8;
    ctx.fillText(label, cv.width/2, cv.height/2);
    const tex = new T.CanvasTexture(cv);
    tex.minFilter = T.LinearFilter;
    const mat = new T.SpriteMaterial({ map:tex, transparent:true, depthWrite:false });
    const sp = new T.Sprite(mat);
    const scale = 0.22 * (this._layoutParams ? this._layoutParams.labelScale : 1);  // 标签自适应缩放接入点
    sp.scale.set(cv.width*scale, cv.height*scale, 1);
    return sp;
  }

  // 相机平滑飞到某节点
  flyTo(id){
    const nd = this.nodes.find(n=>n.id===id);
    if(!nd) return;
    this.autoSpin = false;
    // 把该节点转到正面:根据其当前世界位置反推目标旋转
    this._flyTarget = nd;
    this.camDistTarget = 380;
  }

  setSelected(id){
    this.selected = id;
    if(id) this.focusOn(id);
    else this.clearFocus();
  }

  // 聚焦汇聚:点击节点 → 相关节点发光 + 汇聚到它周围,无关节点淡出
  focusOn(id){
    const T = this.T;
    const center = this.nodes.find(n=>n.id===id);
    if(!center) return;
    this.autoSpin = false;
    this._flyTarget = center;
    this.camDistTarget = 420;

    // 找出所有与中心节点直接相连的节点;同时只显示该节点的连线(默认全隐藏)
    const relatedIds = new Set([id]);
    this.edges.forEach(e=>{
      const on = (e.from.id===id || e.to.id===id);
      e.line.visible = on;
      if(on){ relatedIds.add(e.from.id); relatedIds.add(e.to.id); }
    });
    const related = this.nodes.filter(n=>relatedIds.has(n.id) && n.id!==id);

    // 分级标签:本次钻取只点亮 top-N 最重要(连接数最高)的邻居标签。
    // 点书 → 看全书最核心的几个;点其中一个 → 再看它的核心邻居(逐级下钻)。
    this.nodes.forEach(n=> n._revealLabel=false);
    related.slice().sort((a,b)=> (b.deg||0)-(a.deg||0)).slice(0, 6)
           .forEach(n=> n._revealLabel=true);

    // 中心节点:移到球心附近、发光、不淡出
    center.focusPos = new T.Vector3(0, 0, 0);
    center.glowOn = true; center.dim = false;

    // 相关节点:围绕中心排成一圈(球面环),发光
    const R = 95;   // 汇聚半径
    const n = related.length;
    related.forEach((nd, i)=>{
      const ang = (i / Math.max(1,n)) * Math.PI*2;
      // 在一个倾斜的环上分布,有立体感
      const tilt = 0.5;
      nd.focusPos = new T.Vector3(
        Math.cos(ang)*R,
        Math.sin(ang)*R*tilt,
        Math.sin(ang)*R*0.8
      );
      nd.glowOn = true; nd.dim = false;
    });

    // 无关节点:淡出、退远、不发光
    this.nodes.forEach(nd=>{
      if(!relatedIds.has(nd.id)){
        nd.focusPos = nd.basePos.clone().multiplyScalar(2.4);  // 退远
        nd.glowOn = false; nd.dim = true;
      }
    });
  }

  // 清除聚焦:所有节点平滑回归球面
  clearFocus(){
    this._flyTarget = null;
    this.camDistTarget = 720;
    this.autoSpin = true;
    this.nodes.forEach(nd=>{
      nd.focusPos = null;
      nd.glowOn = false;
      nd.dim = false;
      nd._revealLabel = false;   // 回到默认态:只剩一级书名标签
    });
    this.edges.forEach(e=>{ e.line.visible = false; });   // 回到默认:不画边
  }

  // 搜索高亮:命中节点发光+显标签,其余淡出(原地,不汇聚);清空传空数组。
  highlight(ids){
    const set = new Set(ids || []);
    if(!set.size){ this.setSelected(null); return; }   // 无命中→恢复默认视图
    this.autoSpin = false;
    this._flyTarget = null;
    this.selected = '__search__';   // 让标签逻辑走"只显示 _revealLabel(命中项)"分支
    this.nodes.forEach(nd=>{
      const hit = set.has(nd.id);
      nd.focusPos = null;           // 原地高亮,不像点击那样汇聚
      nd.glowOn = hit;
      nd.dim = !hit;
      nd._revealLabel = hit;        // 命中项显示标签,方便看是哪些
    });
  }

  resetView(){
    this.rot = { x:0, y:0 }; this.autoSpin = true;
    this.camDistTarget = 720;
  }

  resize(){
    if(this.disposed) return;
    const w = this.container.clientWidth, h = this.container.clientHeight;
    this.camera.aspect = w/h; this.camera.updateProjectionMatrix();
    this.renderer.setSize(w, h);
  }

  dispose(){
    this.disposed = true;
    if(this.raf) cancelAnimationFrame(this.raf);

    // 移除所有事件监听器
    try{
      window.removeEventListener('pointermove', this._onMove);
      window.removeEventListener('pointerup', this._onUp);
      if(this.canvas){
        this.canvas.removeEventListener('pointerdown', this._onDown);
        this.canvas.removeEventListener('wheel', this._onWheel);
        this.canvas.removeEventListener('pointermove', this._onPointerMove);
        this.canvas.removeEventListener('click', this._onClick);
      }
    }catch(e){}

    // 递归释放场景里所有 geometry / material / texture
    try{
      this.scene.traverse(obj=>{
        if(obj.geometry) obj.geometry.dispose();
        if(obj.material){
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(m=>{
            if(m.map) m.map.dispose();          // 纹理(label CanvasTexture)
            if(m.dispose) m.dispose();
          });
        }
      });
    }catch(e){}

    // 强制释放 WebGL context(renderer.dispose 不会释放 context,必须 forceContextLoss)
    try{
      this.renderer.dispose();
      this.renderer.forceContextLoss();
      if(this.canvas && this.canvas.parentNode) this.canvas.parentNode.removeChild(this.canvas);
    }catch(e){}

    // 断开引用,助 GC
    this.nodes = []; this.edges = []; this._meshes = null;
    this.scene = null; this.renderer = null; this.camera = null; this.world = null;
  }
}

// ── 等待 Three.js（由 head 的 module 预加载到 window.THREE）──
async function ensureThree(){
  if(THREE) return THREE;
  if(window.THREE){ THREE = window.THREE; return THREE; }
  if(window.__threeLoadError) return null;
  // 等待 three-ready 事件（最多 5 秒）
  return await new Promise(resolve=>{
    let done = false;
    const onReady = ()=>{ if(done) return; done=true; THREE = window.THREE; resolve(THREE); };
    window.addEventListener('three-ready', onReady, { once:true });
    const t0 = Date.now();
    const poll = setInterval(()=>{
      if(window.THREE){ clearInterval(poll); onReady(); }
      else if(window.__threeLoadError || Date.now()-t0 > 5000){ clearInterval(poll); if(!done){ done=true; resolve(null); } }
    }, 100);
  });
}

async function renderGraph(){
  const container = document.getElementById('graph-canvas');
  if(!container) return;

  // 清旧实例
  if(planet){ try{ planet.dispose(); }catch(e){} planet = null; }
  // 移除旧 canvas（保留 hint/legend 等覆盖层）
  Array.from(container.querySelectorAll('canvas')).forEach(c=>c.remove());

  const T = await ensureThree();
  if(!T){
    container.insertAdjacentHTML('beforeend',
      '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#8b909b;font-size:13px;text-align:center;padding:20px">3D 引擎需通过 http 访问<br>请用本地服务器打开（python -m http.server）</div>');
    return;
  }
  if(!Object.keys(state.kus).length) return;

  planet = new KnowledgePlanet(container, T);
  planet.build(state.kus, state.relations);
  if(state.selected) planet.setSelected(state.selected);
  planet.start();
  window.planet = planet;

  window._fitGraph = ()=>{ if(planet) planet.resetView(); };
  if(!window._planetResizeBound){
    window.addEventListener('resize', ()=>{ if(planet) planet.resize(); });
    window._planetResizeBound = true;
  }
}

function relLabel(t){
  const m={CREATED_BY:'提出',SUPPORTS:'支持',CONTRADICTS:'冲突',MENTIONS:'提及',
    BELONGS_TO:'属于',DERIVED_FROM:'衍生',IMPLEMENTS:'实现',USES:'运用',SUPERSEDES:'取代'};
  return m[t]||t;
}

// ════════════════════════════════════════════════════════
//  Wiki 详情面板
// ════════════════════════════════════════════════════════
function selectKU(id){
  if(!state.kus[id]) return;
  state.selected=id;
  if(planet){ try{ planet.setSelected(id); }catch(e){} }
  renderWiki(state.kus[id]);
  hydrateKU(id);   // 原文段落等重字段不在星球初始负载里(为提速),点开时按需补全
  loadSynthesis(id); // 若该节点已有缓存综述,自动显示(GET,不调 LLM)
}

// 读缓存综述(只 GET,不触发 LLM/不花钱)。有缓存就填进 state.synth 并重渲染。
async function loadSynthesis(id){
  if(client.demo) return;
  const cur=state.synth[id];
  if(cur && cur.content) return;                 // 本会话已加载过
  try{
    const r=await client._get('/knowledge/ku/'+encodeURIComponent(id)+'/synthesis');
    if(r && r.has_cache){
      state.synth[id]={content:r.content,model:r.model,generated_at:r.generated_at,stale:false};
      if(state.selected===id) renderWiki(state.kus[id]);
    }
  }catch(e){ /* 无缓存/出错都静默,维持"生成"按钮 */ }
}

// 点「生成综述」→ 调 LLM 生成(或返回缓存)。派生只读视图,后端不写知识库。
async function genSynthesis(id, force){
  if(client.demo){ toast('演示模式无法生成综述,请先连接后端','err'); return; }
  state.synth[id]='loading';
  if(state.selected===id) renderWiki(state.kus[id]);
  try{
    const r=await client._post('/knowledge/ku/'+encodeURIComponent(id)+'/synthesis'+(force?'?force=true':''), {});
    state.synth[id]={content:r.content,model:r.model,generated_at:r.generated_at,stale:!!r.stale};
  }catch(e){
    state.synth[id]=null;
    toast('综述生成失败:'+(e&&e.message?e.message:'请检查已连接后端并配置了 LLM'),'err');
  }
  if(state.selected===id) renderWiki(state.kus[id]);
}
window.genSynthesis=genSynthesis;

// 路径查询(高级检索):把当前节点设为起/终点,查两点最短路径并在星球高亮。
function setPathNode(id, which){
  state.pathSel=state.pathSel||{};
  state.pathSel[which]=id; state.pathSel.result='';
  if(state.selected) renderWiki(state.kus[state.selected]);
}
window.setPathNode=setPathNode;
async function findPath(){
  const ps=state.pathSel||{};
  if(!ps.from||!ps.to){ toast('请先设起点①和终点②','err'); return; }
  try{
    const r=await client._get('/search/path?from_id='+encodeURIComponent(ps.from)+'&to_id='+encodeURIComponent(ps.to));
    if(r.reachable && (r.path||[]).length){
      const names=r.path.map(id=>(state.kus[id]&&state.kus[id].name)||id);
      ps.result='最短路径（'+r.hops+' 跳）：'+names.map(esc).join(' → ');
      if(window.planet){ try{ planet.highlight(r.path); }catch(e){} }
    }else{ ps.result='两节点间无连通路径'; }
  }catch(e){ ps.result='路径查询失败（需已连接后端）'; }
  if(state.selected) renderWiki(state.kus[state.selected]);
}
window.findPath=findPath;

// 按需补全:星球全量接口为瘦身省略了 source_text,点开节点时单独拉 /ku/{id} 拿完整原文,
// 合并回 state.kus 并重渲染(仍选中才刷新,避免快速点击的竞态覆盖)。
async function hydrateKU(id){
  const ku=state.kus[id];
  if(!ku || client.demo) return;                 // 演示数据自带原文,无需拉
  const ex=ku.extra||{};
  if(ex._hydrated || (ex.source_text&&ex.source_text.trim())) return;
  try{
    const full=await client._get('/knowledge/ku/'+encodeURIComponent(id));
    ku.extra=Object.assign({}, ku.extra, full.extra||{}, {_hydrated:true});
    if(state.selected===id) renderWiki(ku);
  }catch(e){ /* 拉不到就维持精简视图,不报错 */ }
}
function clearSelection(){
  state.selected=null;
  if(planet){ try{ planet.setSelected(null); }catch(e){} }

}

// 综合页(synthesis page):把节点在图里的邻域组织成可读的 wiki 词条,
// 而不只是几个原子字段。图仍是唯一真相源,这里只是它的一个只读投影(同 3D 星球)。
function renderWiki(ku){
  if(!ku){ $('#wiki-body').innerHTML=emptyWiki(); return; }
  const c=KU_COLORS[ku.ku_type];
  const ex=ku.extra||{};
  let html=`<div class="wiki-card">`;
  html+=`<div class="wiki-type" style="color:${c};background:${c}1f">
    <span class="lg-dot" style="background:${c};width:8px;height:8px"></span>${KU_LABEL[ku.ku_type]} · ${ku.ku_type}</div>`;
  html+=`<div class="wiki-title">${esc(ku.name)}</div>`;
  if(ku.domain) html+=`<div class="wiki-domain">${esc(ku.domain)}</div>`;

  // ── 概述 ──
  if(ku.ku_type==='Claim'){
    if(ex.statement) html+=`<div class="wiki-summary">${esc(ex.statement)}</div>`;
    const cs=ex.claim_status||'pending';
    html+=`<div class="wiki-section"><div class="conf-row"><span style="font-size:12px;color:var(--ink-2);font-weight:600">置信度</span>
      <span class="status-badge st-${cs}">${cs}</span></div>
      <div class="conf-bar"><div class="conf-fill" style="width:${(ku.confidence*100).toFixed(0)}%"></div></div>
      <div style="text-align:right;margin-top:4px"><span class="conf-val">${(ku.confidence*100).toFixed(0)}%</span></div></div>`;
  } else if(ku.ku_type==='Fact'){
    if(ex.statement) html+=`<div class="wiki-summary">${esc(ex.statement)}</div>`;
    html+=`<div class="wiki-section"><span class="status-badge st-active">已验证事实 · 置信度 100%</span></div>`;
  } else {
    if(ku.summary) html+=`<div class="wiki-summary">${esc(ku.summary)}</div>`;
  }

  // ── AI 综述(第2档:LLM 把节点邻域组织成连贯词条;派生只读视图,不写回知识库)──
  if(!client.demo){
    const sy=state.synth[ku.ku_id];
    html+=`<div class="wiki-section"><h4>AI 综述</h4>`;
    if(sy==='loading'){
      html+=`<div class="synth-loading">正在生成综述…（调用 LLM，请稍候）</div>`;
    }else if(sy && sy.content){
      html+=`<div class="synth-body">${esc(sy.content).replace(/\n/g,'<br>')}</div>`;
      const meta=[sy.model?('模型 '+sy.model):'', sy.stale?'⚠ 知识已更新，建议重新生成':'派生只读视图'].filter(Boolean).join(' · ');
      html+=`<div class="synth-meta">${esc(meta)}</div>
        <button class="synth-btn ghost" onclick="genSynthesis('${ku.ku_id}',true)">重新生成</button>`;
    }else{
      html+=`<button class="synth-btn" onclick="genSynthesis('${ku.ku_id}',false)">✦ 生成 AI 综述</button>
        <div class="synth-hint">把该节点的关联知识用 LLM 组织成连贯词条（只读，不写回知识库）</div>`;
    }
    html+=`</div>`;
  }

  // ── 路径查询(高级检索:两节点间最短路径,结果在星球高亮)──
  if(!client.demo){
    const ps=state.pathSel||{};
    const nm=id=>id?esc(state.kus[id]&&state.kus[id].name||id):'（未设）';
    html+=`<div class="wiki-section"><h4>路径查询</h4>
      <div class="path-ctl">
        <button class="synth-btn ghost" onclick="setPathNode('${ku.ku_id}','from')">设为起点①</button>
        <button class="synth-btn ghost" onclick="setPathNode('${ku.ku_id}','to')">设为终点②</button>
      </div>
      <div class="path-meta">① ${nm(ps.from)} → ② ${nm(ps.to)}</div>`;
    if(ps.from && ps.to) html+=`<button class="synth-btn" onclick="findPath()">查最短路径</button>`;
    if(ps.result) html+=`<div class="path-result">${ps.result}</div>`;
    html+=`</div>`;
  }

  // ── 原文段落 ──
  if(ex.source_text && ex.source_text.trim()){
    html+=`<div class="wiki-section"><h4>原文段落</h4><div class="wiki-source">${esc(ex.source_text)}</div></div>`;
  }
  // Entity 别名
  if(ku.ku_type==='Entity'&&ex.aliases&&ex.aliases.length){
    html+=`<div class="wiki-section"><h4>别名</h4><div class="tag-row">${ex.aliases.map(a=>`<span class="tag">${esc(a)}</span>`).join('')}</div></div>`;
  }

  // ── 邻域按类型分组(去重),组织成词条各段 ──
  const nb={Fact:[],Claim:[],Concept:[],Entity:[],Evidence:[]};
  const seen=new Set([ku.ku_id]);
  getRelations(ku.ku_id).forEach(r=>{
    const o=state.kus[r.other];
    if(!o || seen.has(o.ku_id)) return;
    seen.add(o.ku_id);
    if(nb[o.ku_type]) nb[o.ku_type].push(o);
  });
  // 图里事实/观点通常只连到 Evidence(书),不直接连实体/概念。为让词条真正丰满,
  // 再按"陈述里提到本节点名字/别名"补充相关事实与观点(纯前端聚合,不改图)。
  if(ku.ku_type!=='Evidence'){
    const names=[ku.name, ...((ex.aliases)||[])].filter(n=>n && n.length>=2);
    if(names.length){
      Object.values(state.kus).forEach(k=>{
        if((k.ku_type==='Fact'||k.ku_type==='Claim') && !seen.has(k.ku_id)){
          const st=(k.extra&&k.extra.statement)||k.summary||'';
          if(names.some(n=>st.indexOf(n)>=0)){ seen.add(k.ku_id); nb[k.ku_type].push(k); }
        }
      });
    }
  }
  const stmt=k=>(k.extra&&k.extra.statement)||k.summary||k.name;

  if(ku.ku_type==='Evidence'){
    // 书:来源 + 本书关键词(按连接数排序)
    html+=`<div class="wiki-section"><h4>来源</h4><div class="evid-item">
      <div class="evid-src">${esc(ex.source||ku.name)}</div>
      <div class="evid-meta">${[ex.author,ex.year,ex.page?'p.'+ex.page:''].filter(Boolean).join(' · ')}</div></div></div>`;
    const deg={}; (state.relations||[]).forEach(r=>{ deg[r.from]=(deg[r.from]||0)+1; deg[r.to]=(deg[r.to]||0)+1; });
    const kws=[...nb.Concept,...nb.Entity,...nb.Fact,...nb.Claim].sort((a,b)=>(deg[b.ku_id]||0)-(deg[a.ku_id]||0));
    if(kws.length){
      html+=`<div class="wiki-section"><h4>本书关键词 ${kws.length}（点击看词条/原文）</h4><div class="kw-row">`;
      kws.slice(0,40).forEach(k=>{
        const nm = k.name.length>16 ? k.name.slice(0,15)+'…' : k.name;
        html+=`<span class="kw-chip" onclick="selectKU('${k.ku_id}')">${esc(nm)}</span>`;
      });
      html+=`</div></div>`;
    }
  } else {
    // 实体/概念/事实/观点:综合成词条。相关事实/观点放进固定高度框,内部滚动,省纵向空间。
    if(nb.Fact.length){
      let inner='';
      nb.Fact.slice(0,50).forEach(k=>{ inner+=`<div class="wiki-item fact" onclick="selectKU('${k.ku_id}')">${esc(stmt(k))}</div>`; });
      html+=`<div class="wiki-section"><h4>相关事实 ${nb.Fact.length}</h4><div class="wiki-scroll">${inner}</div></div>`;
    }
    if(nb.Claim.length){
      let inner='';
      nb.Claim.slice(0,50).forEach(k=>{
        const conf=Math.round((k.confidence||0)*100);
        inner+=`<div class="wiki-item claim" onclick="selectKU('${k.ku_id}')"><span class="wiki-conf">${conf}%</span>${esc(stmt(k))}</div>`;
      });
      html+=`<div class="wiki-section"><h4>相关观点 ${nb.Claim.length}</h4><div class="wiki-scroll">${inner}</div></div>`;
    }
    // 关联概念/实体:小星球式散点(省空间,悬停看名、点击进入)
    const linked=[...nb.Concept,...nb.Entity];
    if(linked.length){
      html+=`<div class="wiki-section"><h4>关联 ${linked.length}</h4>${kwCluster(linked)}</div>`;
    }
    if(nb.Evidence.length){
      html+=`<div class="wiki-section"><h4>出自</h4><div class="kw-row">`;
      nb.Evidence.forEach(k=>{ html+=`<span class="kw-chip" onclick="selectKU('${k.ku_id}')">📖 ${esc(k.name)}</span>`; });
      html+=`</div></div>`;
    }
  }

  // 标签
  if(ku.tags&&ku.tags.length){
    html+=`<div class="wiki-section"><h4>标签</h4><div class="tag-row">${ku.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>`;
  }

  html+=`</div>`;
  $('#wiki-body').innerHTML=html;
}

// 关联关键词的小星球式散点:fibonacci 圆盘分布、按类型着色、悬停显名(<title>)、点击进入。
// 比一长串 chip 省纵向空间,且呼应星球主题。
function kwCluster(list, capN){
  const N=Math.min(list.length, capN||80);
  const cx=130, cy=90, R=82, ga=Math.PI*(3-Math.sqrt(5));
  let dots='';
  for(let i=0;i<N;i++){
    const k=list[i];
    const rr=R*Math.sqrt((i+0.5)/N), th=i*ga;
    const x=(cx+rr*Math.cos(th)).toFixed(1), y=(cy+rr*Math.sin(th)).toFixed(1);
    const col=KU_COLORS[k.ku_type]||'#888';
    dots+=`<circle cx="${x}" cy="${y}" r="4" fill="${col}" onclick="selectKU('${k.ku_id}')"><title>${esc(k.name)}</title></circle>`;
  }
  const more=list.length>N?`（显示 ${N}/${list.length}）`:'';
  return `<div class="kw-cluster"><svg viewBox="0 0 260 180" preserveAspectRatio="xMidYMid meet">${dots}</svg></div>`
       + `<div class="kw-cluster-cap">悬停圆点看名称 · 点击进入${more}</div>`;
}

function getRelations(id){
  const out=[];
  state.relations.forEach(r=>{
    if(r.from===id) out.push({other:r.to,type:r.type,dir:'out'});
    else if(r.to===id) out.push({other:r.from,type:r.type,dir:'in'});
  });
  return out;
}

function renderConflicts(){
  const open=state.conflicts.filter(c=>c.status==='open');
  const body=$('#conflict-body');
  if(!open.length){
    body.innerHTML=`<div class="conflict-empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
      <p style="font-size:12.5px">暂无待裁决冲突<br><span style="color:var(--ink-3);font-size:11px">知识库观点一致</span></p></div>`;
    return;
  }
  body.innerHTML=open.map(c=>{
    const a=state.kus[c.claim_a_id], b=state.kus[c.claim_b_id];
    if(!a||!b)return'';
    const pick=state.conflictPick[c.conflict_id];
    return `<div class="conflict-card">
      <div class="cc-head"><span class="cc-domain">${esc(c.domain||'')}</span>
        <span style="font-size:10px;color:var(--ink-3);font-weight:600;margin-left:auto">${c.resolution_strategy}</span></div>
      <div class="cc-claim ${pick===c.claim_a_id?'picked':''}" onclick="pickClaim('${c.conflict_id}','${c.claim_a_id}')">
        <div class="cc-claim-txt">${esc((a.extra&&a.extra.statement)||a.name)}</div>
        <div class="cc-claim-conf">置信度 ${(a.confidence*100).toFixed(0)}%</div></div>
      <div class="cc-vs">对立</div>
      <div class="cc-claim ${pick===c.claim_b_id?'picked':''}" onclick="pickClaim('${c.conflict_id}','${c.claim_b_id}')">
        <div class="cc-claim-txt">${esc((b.extra&&b.extra.statement)||b.name)}</div>
        <div class="cc-claim-conf">置信度 ${(b.confidence*100).toFixed(0)}%</div></div>
      <div class="cc-resolve">
        <button class="btn btn-sm btn-compile" ${pick?'':'disabled'} onclick="resolveConflict('${c.conflict_id}')">采纳所选观点</button>
      </div>
    </div>`;
  }).join('');
}

function pickClaim(cid,clmid){
  state.conflictPick[cid]=clmid;
  renderConflicts();
}

async function resolveConflict(cid){
  const winner=state.conflictPick[cid];
  if(!winner){ toast('请先选择采纳哪个观点','err'); return; }
  if(client.demo){
    await new Promise(r=>setTimeout(r,500));
    const c=state.conflicts.find(x=>x.conflict_id===cid);
    if(c) c.status='resolved';
    // 落败方标 superseded
    const loser=c.claim_a_id===winner?c.claim_b_id:c.claim_a_id;
    if(state.kus[loser]) state.kus[loser].extra.claim_status='superseded';
    if(state.kus[winner]) state.kus[winner].extra.claim_status='active';
    // 移除这对 Claim 间的 CONTRADICTS 关系
    state.relations=state.relations.filter(r=>
      !(r.type==='CONTRADICTS' &&
        ((r.from===loser&&r.to===winner)||(r.from===winner&&r.to===loser))));
    delete state.conflictPick[cid];
    toast('冲突已裁决，落败观点标记为 superseded','ok');
    // 裁决是低频操作，destroy 重建最稳（增量更新与 G6 hover-activate 有内部时序冲突）
    renderGraph();
    renderPanels();
    return;
  }
  try{
    await client._post(`/conflicts/${cid}/resolve`,{winner_id:winner,note:'UI 裁决',resolved_by:'ui'});
    toast('冲突已裁决','ok');
    delete state.conflictPick[cid];
    await loadData();
  }catch(e){ toast('裁决失败','err'); }
}

name: tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # 测试走 stub embedding，不需要 sentence-transformers/torch（重）；
        # 但需要 faiss-cpu（向量索引）、api（文件解析）、llm（provider 抽象测试）。
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,llm]" faiss-cpu pytest

      - name: Run test suite
        env:
          HF_HUB_OFFLINE: "1"   # 离线，避免 CI 反复尝试联网拉模型
        run: pytest tests/ -q
